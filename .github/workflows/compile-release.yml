name: Compile and Release Firmware

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Force the runner to use Node 24 for all steps/actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ESPHome and esptool
        run: pip install esphome esptool

      - name: Extract Version from YAML
        id: get_version
        run: |
          # Use head -n 1 to ensure we only grab the actual version substitution, 
          # not any lines containing 'v${version}' further down the file.
          RAW_VER=$(grep 'version:' al60_factory.yaml | head -n 1 | awk '{print $2}' | tr -d '"')
          # Echoing the shell variable directly into GITHUB_OUTPUT prevents the 
          # runner from parsing it as a GitHub context variable.
          echo "firmware_version=$RAW_VER" >> "$GITHUB_OUTPUT"

      - name: Compile ESPHome Binary
        run: |
          esphome compile al60_factory.yaml

      - name: Prepare Assets and Manifest
        id: prepare_assets
        run: |
          mkdir -p public/firmware
          mkdir -p public/static
          BUILD_PATH=".esphome/build/al60/.pioenvs/al60"
          V_NUM="${{ steps.get_version.outputs.firmware_version }}"

          # 1. Copy individual parts
          cp $BUILD_PATH/bootloader.bin public/firmware/bootloader.bin
          cp $BUILD_PATH/partitions.bin public/firmware/partitions.bin
          cp $BUILD_PATH/ota_data_initial.bin public/firmware/ota_data_initial.bin
          cp $BUILD_PATH/firmware.bin public/firmware/al60_${V_NUM}_ota.bin

          # 2. Bake the version into al60.yaml for the end-user import
          # Using single quotes for the search pattern hides ${version} from the GitHub runner
          cp al60.yaml public/al60.yaml
          sed -i 's/v\${version}/v'"$V_NUM"'/g' public/al60.yaml

          # 3. Create Merged Factory Binary
          esptool.py --chip esp32c3 merge_bin \
            -o public/firmware/al60_${V_NUM}_factory.bin \
            --flash_mode dio \
            --flash_size 4MB \
            0x0000 public/firmware/bootloader.bin \
            0x8000 public/firmware/partitions.bin \
            0xd000 public/firmware/ota_data_initial.bin \
            0x10000 public/firmware/al60_${V_NUM}_ota.bin

          # 4. Calculate MD5
          MD5_OTA=$(md5sum public/firmware/al60_${V_NUM}_ota.bin | awk '{ print $1 }')

          # 5. Create Manifest
          cat <<EOF > public/firmware/manifest.json
          {
            "name": "NIX labs AL60",
            "version": "$V_NUM",
            "home_assistant_domain": "esphome",
            "builds": [
              {
                "chipFamily": "ESP32-C3",
                "parts": [
                  { "path": "al60_${V_NUM}_factory.bin", "offset": 0 }
                ],
                "ota": {
                  "path": "https://n33174.github.io/nixr_dev/firmware/al60_${V_NUM}_ota.bin",
                  "md5": "$MD5_OTA",
                  "release_url": "https://github.com/n33174/nixr_dev/releases/tag/v${V_NUM}",
                  "summary": "Firmware update for NIX labs AL60 v${V_NUM}"
                }
              }
            ]
          }
          EOF

          cp -r static/* public/static/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V_NUM="v${{ steps.get_version.outputs.firmware_version }}"
          gh release create "$V_NUM" \
            public/firmware/*.bin \
            public/firmware/manifest.json \
            --title "Release ${{ steps.get_version.outputs.firmware_version }}" \
            --notes "Automated firmware build for $V_NUM" \
            --generate-notes

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: al60-firmware-${{ steps.get_version.outputs.firmware_version }}
          path: public/firmware/

  deploy-pages:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
