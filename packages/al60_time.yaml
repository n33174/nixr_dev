esphome:
  on_boot:
    # Priority 500: Read time from hardware RTC to seed the system clock.
    # Priority 500 is after DATA (600) so PCF8563 is guaranteed to be set up.
    # pcf8563.read_time calls synchronize_epoch_() internally, which calls
    # settimeofday() — this seeds the system clock so time is valid immediately.
    # No timezone needed here since the RTC stores UTC and synchronize_epoch_
    # expects a UTC epoch.
    - priority: 500
      then:
        - pcf8563.read_time: rtc_time
        - lambda: |-
            if (!id(sntp_time)->now().is_valid()) {
              // RTC had no valid time (brand new or dead battery).
              // Seed with a sensible default so the clock displays something
              // and buttons can be used to set the correct time.
              // 1767225600 = 2026-01-01 00:00:00 UTC
              struct timeval tv = { .tv_sec = 1767225600, .tv_usec = 0 };
              settimeofday(&tv, NULL);
              ESP_LOGW("main", "Boot: RTC invalid — seeded default time (2026-01-01).");
            } else {
              ESP_LOGI("main", "Boot: Hardware RTC time restored.");
            }

    # Priority 200: Apply the restored timezone to sntp_time.
    # The text component 'time_zone' restores its value at ~250,
    # so by priority 200 it is available.
    - priority: 200
      then:
        - lambda: |-
            std::string tz = id(time_zone)->state;
            if (!tz.empty()) {
              id(sntp_time)->set_timezone(tz);
              ESP_LOGI("main", "Boot: Applied restored timezone: %s", tz.c_str());
            }
        # If user had SNTP disabled before reboot, keep it disabled.
        # restore_mode restores the switch state but does NOT fire on_turn_off,
        # so we must manually suspend the SNTP component here.
        - if:
            condition:
              - switch.is_off: sntp_switch
            then:
              - component.suspend: sntp_time
              - logger.log:
                  level: WARN
                  format: "Boot: SNTP suspended (Manual Mode was active before reboot)."

    # Priority 100: Network-dependent tasks (SNTP sync, update check, auto-detect TZ)
    - priority: 100
      then:
        - wait_until:
            condition:
              wifi.connected:
        - if:
            condition:
              - switch.is_on: sntp_switch
            then:
              - lambda: 'id(sntp_time)->update();'
        - update.check: firmware_update
        - if:
            condition:
              lambda: |-
                return !id(timezone_configured); 
            then:
              - button.press: detect_timezone
              - globals.set:
                  id: timezone_configured
                  value: 'true'

    # Priority 50: Mark boot complete. This enables the custom_time on_value
    # handler, which is suppressed during boot to prevent the restored value
    # from overwriting the RTC time and disabling SNTP.
    - priority: 50
      then:
        - globals.set:
            id: boot_complete
            value: 'true'
        - logger.log:
            level: WARN
            format: "Boot sequence complete."

time:
  # Hardware Real Time Clock (PCF8563)
  # read_time()/write_time() always use UTC internally regardless of this setting.
  # We match sntp_time's timezone to avoid overwriting the global TZ in ESPHome 2026.3+
  - platform: pcf8563
    address: 0x51
    update_interval: never
    id: rtc_time
    timezone: ${time_zone}
    on_time:
      # Alarm logic: Check every minute if alarm should fire
      - seconds: 0
        minutes: /1
        then:
          - lambda: |-
              auto now = id(sntp_time)->now();
              auto alarm = id(alarm_time);
              if (id(alarm_enabled)->state && now.hour == alarm->hour && now.minute == alarm->minute) {
                id(RingClock)->start_alarm();
                if (id(alarm_once)->state) {
                  id(alarm_enabled)->turn_off();
                }
              }

  # Internet Time Sync (SNTP)
  # Explicit timezone ensures correct local time from the start
  - platform: sntp
    id: sntp_time
    timezone: ${time_zone}
    on_time_sync:
      then:
        - if:
            condition:
              - switch.is_on: sntp_switch
            then:
              - logger.log:
                  level: WARN
                  format: "SNTP Synchronized — writing to hardware RTC."
              - pcf8563.write_time: rtc_time
            else:
              - logger.log:
                  level: INFO
                  format: "SNTP Sync ignored (Manual Mode active)."

interval:
  # Periodic RTC sync: keep hardware clock accurate
  - interval: 15min
    then:
      - if:
          condition:
            lambda: 'return id(sntp_time)->now().is_valid();'
          then:
            - pcf8563.write_time: rtc_time
            - logger.log:
                level: WARN
                format: "Periodic RTC sync: System time written to hardware RTC."

datetime:
  # Manual time setting via Web UI
  - platform: template
    name: "Custom Time"
    id: custom_time
    type: datetime
    initial_value: "2026-01-01 12:00:00"
    optimistic: True
    restore_value: True
    web_server:
      sorting_group_id: sorting_time
      sorting_weight: 3
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(boot_complete);'
            then:
              - switch.turn_off: sntp_switch
              - lambda: |-
                  // Convert date/time fields to an epoch (treating fields as UTC).
                  // Uses a standard calendar formula — no ESPTime recalc dependency.
                  auto fields_to_epoch = [](int year, int month, int day,
                                            int hour, int minute, int second) -> time_t {
                    int y = year, m = month;
                    if (m <= 2) { y--; m += 12; }
                    long days = 365L*y + y/4 - y/100 + y/400
                              + (153*(m - 3) + 2)/5 + day - 719469;
                    return days * 86400L + hour * 3600L + minute * 60L + second;
                  };

                  // Derive timezone offset from current known-good state:
                  // sntp_time->now() gives local fields, timestamp_now() gives UTC epoch.
                  time_t utc_now = id(sntp_time)->timestamp_now();
                  auto now = id(sntp_time)->now();
                  time_t local_now_as_utc = fields_to_epoch(
                      now.year, now.month, now.day_of_month,
                      now.hour, now.minute, now.second);
                  int32_t tz_offset = (int32_t)(local_now_as_utc - utc_now);

                  // Convert the user-entered local time to UTC epoch
                  time_t entered_as_utc = fields_to_epoch(
                      x.year, x.month, x.day_of_month,
                      x.hour, x.minute, x.second);
                  time_t utc_epoch = entered_as_utc - tz_offset;

                  struct timeval tv = { .tv_sec = utc_epoch, .tv_usec = 0 };
                  settimeofday(&tv, NULL);
                  ESP_LOGI("main", "Custom time set — UTC epoch: %ld (tz_offset: %ds)",
                           (long)utc_epoch, tz_offset);
              - pcf8563.write_time: rtc_time
              - logger.log:
                  level: WARN
                  format: "Manual time applied and saved to RTC."
  
  # Alarm time setting
  - platform: template
    name: "Alarm Time"
    id: alarm_time
    type: time
    initial_value: "07:00:00"
    optimistic: True
    restore_value: True
    web_server:
      sorting_group_id: sorting_alarm
      sorting_weight: 4

switch:
  # Master switch for internet time sync
  - platform: template
    name: "Enable SNTP Sync"
    id: sntp_switch
    optimistic: True
    restore_mode: RESTORE_DEFAULT_ON
    web_server:
      sorting_group_id: sorting_time
      sorting_weight: 2
    on_turn_on:
      then:
        - component.resume: sntp_time
        - lambda: 'id(sntp_time)->update();'
        - if:
            condition:
              lambda: 'return id(sntp_time)->now().is_valid();'
            then:
              - pcf8563.write_time: rtc_time
        - logger.log:
            level: WARN
            format: "SNTP Sync enabled. Restart the clock to force a time sync."
    on_turn_off:
      then:
        - component.suspend: sntp_time
        - logger.log:
            level: WARN
            format: "SNTP Sync suspended"

  # Alarm Controls
  - platform: template
    name: "Alarm Enabled"
    id: alarm_enabled
    optimistic: True
    restore_mode: RESTORE_DEFAULT_OFF
    web_server:
      sorting_group_id: sorting_alarm
      sorting_weight: 1
  
  # Run alarm once then disable
  - platform: template
    name: "Alarm Once"
    id: alarm_once
    optimistic: True
    restore_mode: RESTORE_DEFAULT_OFF
    web_server:
      sorting_group_id: sorting_alarm
      sorting_weight: 2
  
  # Toggle alarm sounds
  - platform: template
    name: "Alarm Sounds"
    id: alarm_sound
    optimistic: True
    restore_mode: RESTORE_DEFAULT_ON
    web_server:
      sorting_group_id: sorting_alarm
      sorting_weight: 3
    
text:
  # POSIX Timezone String
  # Controls how UTC epoch is converted to local display time
  - platform: template
    name: "Time Zone"
    id: time_zone
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ${time_zone}
    web_server:
      sorting_group_id: sorting_time
      sorting_weight: 1
    on_value:
      then:
        - lambda: |-
            id(sntp_time)->set_timezone(x);
            ESP_LOGI("main", "Timezone updated to: %s", x.c_str());
        - lambda: |-
            id(timezone_configured) = true;

button:
  # Detect Timezone via IP Geolocation
  - platform: template
    name: "Auto-Detect Time Zone"
    id: detect_timezone
    web_server:
      sorting_group_id: sorting_time
      sorting_weight: 5
    on_press:
      then:
        - logger.log: "Stage 1: Detecting IANA Timezone..."
        - http_request.get:
            url: "http://ipwho.is/"
            request_headers:
              User-Agent: "ESPHome/AL60"
            capture_response: true
            on_response:
              then:
                - lambda: |-
                    if (body.empty()) {
                      ESP_LOGE("main", "Timezone Stage 1 failed. Check internet.");
                      return;
                    }
                    json::parse_json(body, [](JsonObject root) -> bool {
                      JsonObject tz = root["timezone"];
                        if (tz["id"].is<const char*>() && tz["utc"].is<const char*>()) {
                          id(detected_iana) = tz["id"].as<std::string>();
                          id(detected_offset) = tz["utc"].as<std::string>();
                          id(fetch_posix_rule).press();
                          return true;
                        }
                      return false;
                    });

  # Stage 2: Lookup POSIX Rule from our static database
  - platform: template
    name: "Fetch POSIX Rule"
    id: fetch_posix_rule
    internal: true
    on_press:
      then:
        - logger.log: "Stage 2: Looking up POSIX rule for city..."
        - http_request.get:
            url: !lambda |-
               std::string iana = id(detected_iana);
               size_t pos = iana.find('/');
               std::string continent = (pos != std::string::npos) ? iana.substr(0, pos) : "Etc";
               return "https://n33174.github.io/nixr_dev/static/" + continent + ".json";
            request_headers:
              User-Agent: "ESPHome/AL60"
            capture_response: true
            on_response:
              then:
                - lambda: |-
                    bool found = false;
                    std::string iana = id(detected_iana);
                    if (!body.empty()) {
                      json::parse_json(body, [&found, iana](JsonObject root) -> bool {
                        size_t pos = iana.find('/');
                        std::string city = (pos != std::string::npos) ? iana.substr(pos + 1) : iana;
                        if (root[city].is<const char*>()) {
                          std::string posix = root[city].as<std::string>();
                          auto call = id(time_zone).make_call();
                          call.set_value(posix);
                          call.perform();
                          ESP_LOGI("main", "Success! Applied and saved POSIX rule for %s: %s", iana.c_str(), posix.c_str());
                          found = true;
                          return true;
                        }
                        return false;
                      });
                    }

                    if (!found) {
                      ESP_LOGW("main", "City '%s' not in DB or DB unreachable. Fallback: ${time_zone}", iana.c_str());
                      auto call = id(time_zone).make_call();
                      call.set_value("${time_zone}");
                      call.perform();
                    }
