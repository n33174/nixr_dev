# Variable to used by the system
globals:
  - id: last_clock_effect
    type: std::string
    restore_value: yes
    initial_value: '"Clock"'
  - id: last_light_control_mode
    type: std::string
    initial_value: '""'
  - id: timezone_configured
    type: bool
    restore_value: true
    initial_value: "false"
  - id: boot_complete
    type: bool
    initial_value: "false"
  - id: detected_iana
    type: std::string
  - id: detected_offset
    type: std::string
  - id: wifi_configured
    type: bool
    restore_value: true
    initial_value: "false"
  - id: minute_button_long_press
    type: bool
    initial_value: "false"
  - id: hour_button_long_press
    type: bool
    initial_value: "false"
  - id: timer_h
    type: int
    initial_value: "0"
  - id: timer_m
    type: int
    initial_value: "0"
  - id: timer_s
    type: int
    initial_value: "0"
  - id: colours_initialized
    type: bool
    restore_value: true
    initial_value: "false"

esphome:
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf
    sdkconfig_options:
      # CRITICAL: RMT ISR in IRAM — prevents Flash cache miss during WS2812 frame transmission.
      # Without this, a Flash read stall inside the ISR can gap the bitstream and cause green flashes.
      CONFIG_RMT_ISR_IRAM_SAFE: "y"
      # Keep the WiFi interrupt handler and RX path in IRAM.
      # This cuts max WiFi ISR duration from ~100µs to ~5µs — below the 50µs WS2812 reset threshold.
      CONFIG_ESP_WIFI_IRAM_OPT: "y"
      CONFIG_ESP_WIFI_RX_IRAM_OPT: "y"
      # The RMT driver uses FreeRTOS ring buffers internally during TX.
      # Placing their ISR functions in IRAM prevents a secondary Flash-stall path.
      CONFIG_RINGBUF_PLACE_ISR_FUNCTIONS_IN_IRAM: "y"

# Logging Configuration
logger:
  level: INFO
  logs:
    # Suppress noisy sensor value updates
    sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    text: WARN
    datetime.datetime_entity: WARN
    ld2410: WARN

    # Keep important components visible
    component: INFO
    api: INFO
    ota: INFO
    wifi: INFO
    web_server: INFO

# Native API for Home Assistant
api:
  # No encryption key by default to make local access easier
  # Can be added in local overrides if desired
  reboot_timeout: 0s

# Over-The-Air Updates
ota:
  - platform: http_request # Allow pulling updates from the internet
  - platform: web_server # Allow uploading via web UI
  - platform: esphome # Allow updating via ESPHome dashboard

# Required for http_request OTA platform and timezone discovery
http_request:
json:

# Update Check for NIX labs compiled firmware
update:
  - platform: http_request
    id: firmware_update
    name: Firmware Update
    source: https://n33174.github.io/nixr_dev/firmware/manifest.json
    web_server:
      sorting_group_id: sorting_system
      sorting_weight: 1

wifi:
  # Power save disabled: modem sleep causes the radio to miss incoming TCP SYN packets,
  # making the web interface unreachable from a browser (while HA's persistent API connection
  # continues to work fine). The other IRAM + dirty-bit + ring buffer mitigations already
  # address green-flash at the source — power save was the smallest contributor.
  power_save_mode: none

  # Fallback Access Point
  ap:
    ssid: "${friendly_name}"
    password: "12345678"

  # Re-enable SNTP sync on first Wi-Fi connection
  on_connect:
    - lambda: |-
        // Log IP at WARN level — the default WiFi IP log is DEBUG-only and filtered out.
        auto ip = esphome::network::get_ip_addresses();
        if (!ip.empty()) {
          ESP_LOGW("wifi", "Connected — IP: %s  Web UI: http://%s",
                   ip[0].str().c_str(), ip[0].str().c_str());
        }
    - if:
        condition:
          lambda: "return !id(wifi_configured);"
        then:
          # Re-enable SNTP on first WiFi connection, even if manual time was
          # previously set. The user can turn it off again after sync completes.
          - switch.turn_on: sntp_switch
          - globals.set:
              id: wifi_configured
              value: "true"
          - logger.log: "First Wi-Fi connection detected — SNTP sync enabled."

# Captive Portal for fallback wifi configuration
captive_portal:

# Web Interface Configuration
web_server:
  id: web_ui
  port: 80
  version: 3

  # Custom NIX labs branded JavaScript (Theme built-in)
  js_url: https://n33174.github.io/nixr_dev/static/www.js

  # Organize the web entities into logical groups
  sorting_groups:
    - id: sorting_time
      name: "Time Settings"
      sorting_weight: 10
    - id: sorting_clock
      name: "Clock Settings"
      sorting_weight: 20
    - id: sorting_clock_led
      name: "Clock LED Customisation"
      sorting_weight: 25
    - id: sorting_sensors
      name: "Sensors"
      sorting_weight: 30
    - id: sorting_timer
      name: "Timer & Stopwatch"
      sorting_weight: 40
    - id: sorting_alarm
      name: "Alarm"
      sorting_weight: 45
    - id: sorting_other
      name: "Other"
      sorting_weight: 50
    - id: sorting_system
      name: "System"
      sorting_weight: 60
