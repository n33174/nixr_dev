# Variable to used by the system
globals:
  - id: last_clock_effect
    type: std::string
    restore_value: yes
    initial_value: '"Clock"'
  - id: last_light_control_mode
    type: std::string
    initial_value: '""'
  - id: timezone_configured
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: boot_complete
    type: bool
    initial_value: 'false'
  - id: detected_iana
    type: std::string
  - id: detected_offset
    type: std::string
  - id: wifi_configured
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: minute_button_long_press
    type: bool
    initial_value: 'false'
  - id: hour_button_long_press
    type: bool
    initial_value: 'false'
  - id: timer_h
    type: int
    initial_value: '0'
  - id: timer_m
    type: int
    initial_value: '0'
  - id: timer_s
    type: int
    initial_value: '0'

esphome:
  project:
    name: "NIXlabs.AL60"
    version: "${version}"
  name: "${name}"
  friendly_name: "${friendly_name}"
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio
    
esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf

# Logging Configuration
logger:
  level: INFO
  logs:

    # Suppress noisy sensor value updates
    sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    text: WARN
    datetime.datetime_entity: WARN
    ld2410: WARN

    # Keep important components visible
    component: INFO
    api: INFO
    ota: INFO
    wifi: INFO
    web_server: INFO

# Native API for Home Assistant
api:
  # No encryption key by default to make local access easier
  # Can be added in local overrides if desired
  reboot_timeout: 0s

# Over-The-Air Updates
ota:
  - platform: http_request # Allow pulling updates from the internet
  - platform: web_server   # Allow uploading via web UI
  - platform: esphome      # Allow updating via ESPHome dashboard

# Required for http_request OTA platform and timezone discovery
http_request:
json:

# Update Check for NIX labs compiled firmware
update:
  - platform: http_request
    id: firmware_update
    name: Firmware Update
    source: https://n33174.github.io/nixr_dev/firmware/manifest.json
    web_server:
      sorting_group_id: sorting_system
      sorting_weight: 1

# Bluetooth Provisioning
esp32_improv:
  authorizer: none

# Serial Provisioning
improv_serial:

wifi:
  # Enable Wi-Fi power saving mode for maximum stability
  power_save_mode: light

  # Fallback Access Point
  ap:
    ssid: "${friendly_name}"
    password: "12345678"

  # Re-enable SNTP sync on first Wi-Fi connection
  on_connect:
    - if:
        condition:
          lambda: 'return !id(wifi_configured);'
        then:
          - switch.turn_on: sntp_switch
          - globals.set:
              id: wifi_configured
              value: 'true'
          - logger.log: "First Wi-Fi connection detected! Enabling SNTP sync."

# Captive Portal for fallback wifi configuration
captive_portal:

# Web Interface Configuration
web_server:
  id: web_ui
  port: 80
  version: 3

  # Custom NIX labs branded JavaScript (Theme built-in)
  js_url: https://n33174.github.io/nixr_dev/static/www.js
  
  # Organize the web entities into logical groups
  sorting_groups:
    - id: sorting_time
      name: "Time Settings"
      sorting_weight: 10
    - id: sorting_clock
      name: "Clock Settings"
      sorting_weight: 20
    - id: sorting_clock_led
      name: "Clock LED Customisation"
      sorting_weight: 25
    - id: sorting_sensors
      name: "Sensors"
      sorting_weight: 30
    - id: sorting_timer
      name: "Timer & Stopwatch"
      sorting_weight: 40
    - id: sorting_alarm
      name: "Alarm"
      sorting_weight: 45
    - id: sorting_other
      name: "Other"
      sorting_weight: 50
    - id: sorting_system
      name: "System"
      sorting_weight: 60